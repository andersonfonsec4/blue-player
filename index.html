<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BluePlayer</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="src/css/style.css" />

    <meta name="theme-color" content="#0b0f1a" />
  </head>

  <body>
    <div class="container">
      <aside class="sidebar">
        <h1>BluePlayer</h1>

        <button id="upload-btn">Adicionar músicas</button>

        <input type="file" id="file-input" multiple accept="audio/*" hidden />

        <ul id="playlist"></ul>
      </aside>

      <main class="player-area">
        <canvas id="visualizer" class="visualizer"></canvas>

        <h2 id="trackTitle">Selecione uma música</h2>

        <div class="controls">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>

        <input type="range" id="progress" class="progress" value="0" />
      </main>
    </div>

    <footer class="bottom-controls">
      <input
        type="range"
        id="volume"
        class="volume"
        min="0"
        max="1"
        step="0.01"
        value="1"
      />

      <div class="eq">
        <div>
          <label>Grave</label>
          <input type="range" id="bass" min="-10" max="10" value="0" />
        </div>

        <div>
          <label>Médio</label>
          <input type="range" id="mid" min="-10" max="10" value="0" />
        </div>

        <div>
          <label>Agudo</label>
          <input type="range" id="treble" min="-10" max="10" value="0" />
        </div>
      </div>

      <button id="fullscreen" class="fullscreen">⛶</button>
    </footer>

    <script src="src/js/player.js"></script>
    <script src="src/js/playlist.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/visualizer.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
