<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>BluePlayer</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="src/css/style.css" />

    <meta name="theme-color" content="#0b0f1a" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="logo">BluePlayer</h1>

        <input type="file" id="file-input" multiple accept="audio/*" hidden />

        <button id="upload-btn">Adicionar músicas</button>

        <ul id="playlist"></ul>
      </aside>

      <main class="player">
        <canvas id="visualizer"></canvas>

        <h2 id="track-title">Selecione uma música</h2>

        <div class="controls">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>

        <input id="progress" type="range" min="0" max="100" value="0" />
      </main>
    </div>

    <footer class="footer">
      <div class="volume-area">
        <label>Volume</label>

        <div class="slider-box">
          <input
            id="volume"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />

          <span id="volume-value">100%</span>
        </div>
      </div>

      <div class="eq">
        <div class="eq-band">
          <input id="bass" type="range" min="-10" max="10" value="0" />
          <span class="eq-value" id="bass-value">0</span>
          <label>Grave</label>
        </div>

        <div class="eq-band">
          <input id="mid" type="range" min="-10" max="10" value="0" />
          <span class="eq-value" id="mid-value">0</span>
          <label>Médio</label>
        </div>

        <div class="eq-band">
          <input id="treble" type="range" min="-10" max="10" value="0" />
          <span class="eq-value" id="treble-value">0</span>
          <label>Agudo</label>
        </div>
      </div>

      <button id="fullscreen">⛶</button>
    </footer>

    <script src="src/js/playlist.js"></script>
    <script src="src/js/player.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/visualizer.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
</html>
